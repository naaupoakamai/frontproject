<section class="mx-auto max-w-xl border border-[#E5E7EB] px-16 py-20">
  <div class="flex items-center justify-between gap-4">
    <h2 class="text-3xl tracking-[0.1em]">Account Access</h2>
    <div class="flex border border-[#E5E7EB]">
      <button
        type="button"
        (click)="setMode('login')"
        class="px-4 py-2 text-xs uppercase tracking-[0.14em] transition-all duration-300 ease-in-out"
        [class.bg-black]="mode() === 'login'"
        [class.text-white]="mode() === 'login'"
      >
        Login
      </button>
      <button
        type="button"
        (click)="setMode('register')"
        class="px-4 py-2 text-xs uppercase tracking-[0.14em] transition-all duration-300 ease-in-out"
        [class.bg-black]="mode() === 'register'"
        [class.text-white]="mode() === 'register'"
      >
        Register
      </button>
    </div>
  </div>
  <p class="mt-6 text-sm text-black/70">Войдите в аккаунт или зарегистрируйтесь и выберите роль: продавец или покупатель.</p>

  <form (ngSubmit)="submit()" class="mt-12 space-y-10">
    @if (mode() === 'login') {
      <div [formGroup]="loginForm" class="space-y-10">
        <div>
          <label class="block text-xs uppercase tracking-[0.14em] text-black/60">Email</label>
          <input
            type="email"
            formControlName="email"
            class="mt-3 w-full border-0 border-b border-black px-0 py-3 outline-none transition-all duration-300 ease-in-out focus:border-black"
          />
        </div>
        <div>
          <label class="block text-xs uppercase tracking-[0.14em] text-black/60">Password</label>
          <input
            type="password"
            formControlName="password"
            class="mt-3 w-full border-0 border-b border-black px-0 py-3 outline-none transition-all duration-300 ease-in-out focus:border-black"
          />
        </div>
      </div>
    } @else {
      <div [formGroup]="registerForm" class="space-y-10">
        <div>
          <label class="block text-xs uppercase tracking-[0.14em] text-black/60">Email</label>
          <input
            type="email"
            formControlName="email"
            class="mt-3 w-full border-0 border-b border-black px-0 py-3 outline-none transition-all duration-300 ease-in-out focus:border-black"
          />
        </div>
        <div>
          <label class="block text-xs uppercase tracking-[0.14em] text-black/60">Password</label>
          <input
            type="password"
            formControlName="password"
            class="mt-3 w-full border-0 border-b border-black px-0 py-3 outline-none transition-all duration-300 ease-in-out focus:border-black"
          />
        </div>
        <div>
          <label class="block text-xs uppercase tracking-[0.14em] text-black/60">Role</label>
          <select
            formControlName="is_seller"
            class="mt-3 w-full border-0 border-b border-black bg-transparent px-0 py-3 outline-none transition-all duration-300 ease-in-out focus:border-black"
          >
            <option [ngValue]="false">Покупатель</option>
            <option [ngValue]="true">Продавец</option>
          </select>
        </div>
      </div>
    }

    <button
      type="submit"
      class="w-full border border-black px-6 py-4 text-xs uppercase tracking-[0.16em] transition-all duration-300 ease-in-out hover:shadow-sm"
    >
      @if (isLoading()) {
        Processing...
      } @else if (mode() === 'register') {
        Create Account
      } @else {
        Enter BESPEAK
      }
    </button>
  </form>
</section>
